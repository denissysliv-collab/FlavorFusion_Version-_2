<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • FlavorFusion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #FF6B6B;
            --primary-dark: #FF5252;
            --primary-light: #FF9A9A;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD166;
            --dark-color: #2D3436;
            --light-color: #F9F9F9;
            --gray-color: #636E72;
            --light-gray: #DFE6E9;
            --success-color: #00B894;
            --danger-color: #D63031;
            
            --gradient-primary: linear-gradient(135deg, #FF6B6B, #FF8E53);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.15);
            
            --radius-sm: 8px;
            --radius-md: 12px; 
            --radius-lg: 16px;
            --radius-circle: 50%;
            
            --transition-normal: 0.3s ease;
            
            --font-primary: 'Poppins', sans-serif;
            --font-secondary: 'Playfair Display', serif;
        }

        body {
            font-family: var(--font-primary);
            font-size: 16px;
            line-height: 1.6;
            color: var(--dark-color);
            background: linear-gradient(135deg, #FFFBFA 0%, #FFFFFF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header__content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--dark-color);
            font-size: 1.4rem;
            font-weight: 700;
        }

        .logo-icon {
            color: var(--primary-color);
            font-size: 1.6rem;
        }

        .logo-highlight {
            color: var(--primary-color);
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav__link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--gray-color);
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            transition: all var(--transition-normal);
        }

        .nav__link:hover {
            color: var(--primary-color);
            background: rgba(255, 107, 107, 0.1);
        }

        /* ===== ФОРМА ВХОДА ===== */
        .auth-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .auth-header {
            background: var(--gradient-primary);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .auth-header h1 {
            font-family: var(--font-secondary);
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: white;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            font-size: 1.1rem;
        }

        .auth-form {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
            font-size: 0.95rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--light-gray);
            border-radius: var(--radius-md);
            font-family: var(--font-primary);
            font-size: 1rem;
            color: var(--dark-color);
            background: white;
            transition: all var(--transition-normal);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .password-input {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-color);
            cursor: pointer;
            padding: 4px;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--gray-color);
        }

        .checkbox-label input {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-primary);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-normal);
            text-decoration: none;
            width: 100%;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .auth-footer {
            text-align: center;
            padding: 25px 40px;
            border-top: 1px solid var(--light-gray);
            background: var(--light-color);
        }

        .auth-footer p {
            color: var(--gray-color);
            margin: 0;
        }

        .auth-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .auth-link:hover {
            text-decoration: underline;
        }

        /* ===== FOOTER ===== */
        .footer {
            background: var(--dark-color);
            color: white;
            padding: 30px 0;
            text-align: center;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: white;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .auth-container {
                max-width: 100%;
                margin: 0 15px;
            }
            
            .auth-header {
                padding: 30px 20px;
            }
            
            .auth-form {
                padding: 30px 20px;
            }
            
            .auth-header h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .nav__link span {
                display: none;
            }
            
            .auth-header h1 {
                font-size: 1.6rem;
            }
            
            .auth-header p {
                font-size: 1rem;
            }
            
            .checkbox-group {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="../index.html" class="logo">
                    <i class="fas fa-utensils logo-icon"></i>
                    <span class="logo-text">Flavor<span class="logo-highlight">Fusion</span></span>
                </a>
                <nav class="nav">
                    <a href="../index.html" class="nav__link">
                        <i class="fas fa-home"></i>
                        <span>На главную</span>
                    </a>
                    <a href="register.html" class="nav__link">
                        <i class="fas fa-user-plus"></i>
                        <span>Регистрация</span>
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-header">
                <h1>С возвращением!</h1>
                <p>Войдите в свой аккаунт</p>
            </div>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Электронная почта</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.com" required>
                    <div class="error-message" id="emailError">Введите корректный email</div>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Введите пароль" required>
                        <button type="button" class="password-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError">Введите пароль</div>
                </div>
                
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> Запомнить меня
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    Войти
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 FlavorFusion. Все права защищены.</p>
            <div class="footer-links">
                <a href="#">Политика конфиденциальности</a>
                <a href="#">Условия использования</a>
            </div>
        </div>
    </footer>

    <script>
        // =============================================
        // КОНФИГУРАЦИЯ API
        // =============================================
        const API_BASE = 'http://localhost:5000/api';

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');

        // Показать/скрыть пароль
        document.getElementById('togglePassword').addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // Убираем ошибку при вводе
        emailInput.addEventListener('input', () => {
            emailError.style.display = 'none';
            emailInput.classList.remove('error');
        });
        passwordInput.addEventListener('input', () => {
            passwordError.style.display = 'none';
            passwordInput.classList.remove('error');
        });

        /**
         * Обработка отправки формы логина — реальный запрос к API
         */
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            let isValid = true;

            // Сброс ошибок
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');

            // Клиентская валидация
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value)) {
                emailError.style.display = 'block';
                emailInput.classList.add('error');
                isValid = false;
            }

            if (!passwordInput.value.trim()) {
                passwordError.style.display = 'block';
                passwordInput.classList.add('error');
                isValid = false;
            }

            if (!isValid) return;

            // Кнопка загрузки
            const submitBtn = loginForm.querySelector('.btn-primary');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Вход...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value.trim(),
                        password: passwordInput.value,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    // 401 — неверный email/пароль
                    passwordError.textContent = data.error || 'Неверный email или пароль';
                    passwordError.style.display = 'block';
                    passwordInput.classList.add('error');
                    return;
                }

                // Успех: сохраняем ТОЛЬКО токен
                localStorage.setItem('token', data.token);

                // Если выбрано "Запомнить меня" — сохраняем email для автозаполнения
                const remember = document.getElementById('remember').checked;
                if (remember) {
                    localStorage.setItem('rememberedEmail', emailInput.value);
                } else {
                    localStorage.removeItem('rememberedEmail');
                }

                // ВАЖНО: НЕ сохраняем currentUser в localStorage!
                // При загрузке index.html фронтенд вызовет GET /api/users/me
                // для получения свежих данных напрямую из БД

                alert('Вход выполнен успешно! Перенаправляем на главную...');
                window.location.href = '../index.html';

            } catch (err) {
                console.error('Ошибка сети:', err);
                alert('Ошибка сети. Убедитесь, что сервер запущен на http://localhost:5000');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Автозаполнение email, если был выбран "Запомнить меня"
        const rememberedEmail = localStorage.getItem('rememberedEmail');
        if (rememberedEmail) {
            emailInput.value = rememberedEmail;
            document.getElementById('remember').checked = true;
        }
    </script>
</body>
</html>
