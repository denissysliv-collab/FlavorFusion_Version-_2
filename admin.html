<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель • FlavorFusion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #FF6B6B;
            --primary-dark: #FF5252;
            --primary-light: #FF9A9A;
            --secondary-color: #4ECDC4;
            --accent-color: #FFD166;
            --dark-color: #2D3436;
            --light-color: #F9F9F9;
            --gray-color: #636E72;
            --light-gray: #DFE6E9;
            --success-color: #00B894;
            --danger-color: #D63031;
            --gradient-primary: linear-gradient(135deg, #FF6B6B, #FF8E53);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --font-primary: 'Poppins', sans-serif;
            --font-secondary: 'Playfair Display', serif;
        }
        body {
            font-family: var(--font-primary);
            background: linear-gradient(135deg, #FFFBFA 0%, #FFFFFF 100%);
            color: var(--dark-color);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header__content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--dark-color); font-size: 1.4rem; font-weight: 700; }
        .logo-icon { color: var(--primary-color); font-size: 1.6rem; }
        .logo-highlight { color: var(--primary-color); }
        .nav { display: flex; align-items: center; gap: 20px; }
        .nav__link { display: flex; align-items: center; gap: 6px; color: var(--gray-color); text-decoration: none; font-weight: 500; padding: 8px 16px; border-radius: var(--radius-sm); transition: all 0.3s ease; }
        .nav__link:hover { color: var(--primary-color); background: rgba(255,107,107,0.1); }
        .admin-section { padding: 40px 0; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 2rem; color: var(--primary-color); margin-bottom: 10px; }
        .stat-card h3 { font-size: 1.8rem; margin: 10px 0; }
        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid var(--light-gray);
            margin-bottom: 20px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--gray-color);
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: -2px;
        }
        .table-container {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            overflow-x: auto;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--light-gray);
        }
        th {
            background-color: var(--light-color);
            font-weight: 600;
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.85rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 2px;
        }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-warning { background: var(--accent-color); color: var(--dark-color); }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-secondary { background: var(--gray-color); color: white; }
        .btn-secondary:hover { background: var(--dark-color); }
        .footer {
            background: var(--dark-color);
            color: white;
            text-align: center;
            padding: 30px 0;
            margin-top: 40px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray-color);
        }
        .filter-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: white;
            padding: 15px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
        }
        .filter-bar input {
            padding: 10px 15px;
            border: 2px solid var(--light-gray);
            border-radius: var(--radius-md);
            font-family: var(--font-primary);
            flex: 1;
            min-width: 250px;
        }
        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .recipe-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }
        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }
        .recipe-image {
            height: 200px;
            position: relative;
            overflow: hidden;
            background: var(--light-gray);
        }
        .recipe-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .recipe-card:hover .recipe-image img {
            transform: scale(1.1);
        }
        .recipe-actions {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }
        .recipe-card:hover .recipe-actions {
            opacity: 1;
        }
        .btn-action {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            color: var(--dark-color);
        }
        .btn-action:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }
        .btn-action.btn-delete:hover {
            background: var(--danger-color);
        }
        .recipe-content {
            padding: 20px;
        }
        .recipe-title {
            font-size: 1.15rem;
            font-family: var(--font-secondary);
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 8px;
        }
        .recipe-author {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: var(--gray-color);
        }
        .recipe-description {
            color: var(--gray-color);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .recipe-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--light-gray);
            font-size: 0.75rem;
            color: var(--gray-color);
        }
        .filter-bar{
            display: none;
        }
        @media (max-width: 768px) {
            .recipes-grid { grid-template-columns: 1fr; }
            .recipe-actions { opacity: 1; }
            .btn-action { width: 44px; height: 44px; }
            th, td { padding: 8px; font-size: 0.9rem; }
            .tab-btn { padding: 8px 12px; font-size: 0.9rem; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease forwards; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="index.html" class="logo">
                    <i class="fas fa-utensils logo-icon"></i>
                    <span class="logo-text">Flavor<span class="logo-highlight">Fusion</span></span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav__link"><i class="fas fa-home"></i><span>Главная</span></a>
                    <a href="#" id="logoutBtn" class="nav__link"><i class="fas fa-sign-out-alt"></i><span>Выйти</span></a>
                </nav>
            </div>
        </div>
    </header>

    <section class="admin-section">
        <div class="container">
            <h1>Панель администратора</h1>
            <div class="stats-grid" id="statsGrid"></div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="users">👥 Пользователи</button>
                <button class="tab-btn" data-tab="recipes">📖 Рецепты</button>
              
            </div>

            <div id="recipesFilter" class="filter-bar" style="display: none;">
                <input type="text" id="authorSearch" placeholder="🔍 Поиск по email или имени автора">
                <button id="searchBtn" class="btn-sm btn-primary">🔍 Найти</button>
                <button id="resetSearchBtn" class="btn-sm btn-secondary">🔄 Сбросить</button>
            </div>

            <div id="tabContent" class="table-container">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 FlavorFusion. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>
